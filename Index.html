<!DOCTYPE html>
<html>
<head>
    <title>Google Sheet Viewer</title>

    <script src="https://www.gstatic.com/charts/loader.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th {
            background: #0d6efd;
            color: white;
            padding: 8px;
        }

        td {
            padding: 8px;
            border: 1px solid #ddd;
        }

        tr:nth-child(even) {
            background: #f7f7f7;
        }
    </style>
</head>

<body>

<h2>Tournament Schedule</h2>

<div id="table"></div>

<script>

google.charts.load('current');

google.charts.setOnLoadCallback(loadSheet);

function loadSheet() {

    var query = new google.visualization.Query(
       'https://docs.google.com/spreadsheets/d/17IoHTb3PcJvaKNDMSlxS2Hw6wZgpvOTaQtuWWlaTbP4/gviz/tq?sheet=Verses'
    );

    query.send(function (response) {

        if (response.isError()) {
            alert(response.getMessage());
            return;
        }

        var data = response.getDataTable();

        let html = "<table>";

        html += "<tr>";

        for (let c = 0; c < data.getNumberOfColumns(); c++) {
            html += "<th>" + data.getColumnLabel(c) + "</th>";
        }

        html += "</tr>";

        for (let r = 0; r < data.getNumberOfRows(); r++) {

            html += "<tr>";

            for (let c = 0; c < data.getNumberOfColumns(); c++) {
                html += "<td>" + data.getFormattedValue(r, c) + "</td>";
            }

            html += "</tr>";
        }

        html += "</table>";

        document.getElementById("table").innerHTML = html;

    });

}

</script>

</body>
</html>
