<!DOCTYPE html>
<html>
<head>
    <title>Google Sheet Viewer</title>

    <script src="https://www.gstatic.com/charts/loader.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        h2 {
            margin-top: 30px;
            color: #0d6efd;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 30px;
        }

        th {
            background: #0d6efd;
            color: white;
            padding: 8px;
            text-align: left;
        }

        td {
            padding: 8px;
            border: 1px solid #ddd;
        }

        tr:nth-child(even) {
            background: #f7f7f7;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

<h1>Tournament Schedule</h1>

<div id="table"></div>


<script>

google.charts.load('current');

google.charts.setOnLoadCallback(loadAllSheets);


// Put your Google Sheet tab names here
const sheets = [
    "Verses",
    "Announcements",
    "Questions"
];


const spreadsheetId = 
    "17IoHTb3PcJvaKNDMSlxS2Hw6wZgpvOTaQtuWWlaTbP4";


function loadAllSheets() {

    sheets.forEach(function(sheetName) {
        loadSheet(sheetName);
    });

}



function loadSheet(sheetName) {

    const url =
        `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?sheet=${encodeURIComponent(sheetName)}`;


    const query = new google.visualization.Query(url);


    query.send(function(response) {


        if (response.isError()) {

            document.getElementById("table").insertAdjacentHTML(
                "beforeend",
                `<div class="error">
                    Error loading ${sheetName}: 
                    ${response.getMessage()}
                 </div>`
            );

            return;
        }


        const data = response.getDataTable();


        let html = "";

        html += `<h2>${sheetName}</h2>`;

        html += "<table>";


        // Header row
        html += "<tr>";

        for (let c = 0; c < data.getNumberOfColumns(); c++) {

            html += 
                "<th>" +
                data.getColumnLabel(c) +
                "</th>";

        }

        html += "</tr>";



        // Data rows
        for (let r = 0; r < data.getNumberOfRows(); r++) {

            html += "<tr>";

            for (let c = 0; c < data.getNumberOfColumns(); c++) {

                html += 
                    "<td>" +
                    data.getFormattedValue(r, c) +
                    "</td>";

            }

            html += "</tr>";

        }


        html += "</table>";


        // IMPORTANT:
        // append instead of replacing
        document
            .getElementById("table")
            .insertAdjacentHTML("beforeend", html);

    });

}


</script>


</body>
</html>
